name: Balina Uyarısı

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  balina-kontrol:
    runs-on: ubuntu-latest
    steps:
      - name: Balina Kontrolü
        uses: actions/github-script@v7
        env:
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          script: |
            const https = require('https');

            function httpsGetWithHeaders(url, headers) {
              return new Promise((resolve) => {
                https.get(url, { headers }, (res) => {
                  let data = '';
                  res.on('data', chunk => data += chunk);
                  res.on('end', () => { try { resolve(JSON.parse(data)); } catch { resolve(null); } });
                }).on('error', () => resolve(null));
              });
            }

            function httpsPost(url, body) {
              return new Promise((resolve) => {
                const data = JSON.stringify(body);
                const urlObj = new URL(url);
                const options = {
                  hostname: urlObj.hostname,
                  path: urlObj.pathname,
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(data) }
                };
                const req = https.request(options, resolve);
                req.on('error', () => resolve(null));
                req.write(data);
                req.end();
              });
            }

            const headers = {
              'accept': 'application/json',
              'CG-API-KEY': process.env.COINGLASS_API_KEY
            };

            const [alertData, posData] = await Promise.all([
              httpsGetWithHeaders('https://open-api-v4.coinglass.com/api/hyperliquid/whale-alert', headers),
              httpsGetWithHeaders('https://open-api-v4.coinglass.com/api/hyperliquid/whale-position', headers)
            ]);

            const whales = alertData?.data || [];
            const positions = posData?.data || [];

            const fiveMinsAgo = Date.now() - 5 * 60 * 1000;
            const recent = whales.filter(w => Number(w.create_time) > fiveMinsAgo);

            let message = '';

            if (recent.length > 0) {
              message += '🐋 Hyperliquid Balina Alarmı!\n\n';
              for (const w of recent.slice(0, 5)) {
                const action = w.position_action === 1 ? '🟢 POZİSYON AÇTI' : '🔴 POZİSYON KAPATTI';
                message += `${action} ${w.symbol}\n`;
                message += `💰 $${Number(w.position_value_usd).toLocaleString()}\n`;
                message += `💵 Giriş: $${w.entry_price}\n`;
                message += `⏰ ${new Date(Number(w.create_time)).toLocaleTimeString('tr-TR')}\n\n`;
              }
            }

            if (positions.length > 0) {
              message += '📊 En Büyük Pozisyonlar:\n\n';
              for (const p of positions.slice(0, 3)) {
                const side = Number(p.position_size) > 0 ? '🟢 LONG' : '🔴 SHORT';
                const pnl = Number(p.unrealized_pnl) > 0
                  ? `+$${Number(p.unrealized_pnl).toLocaleString()}`
                  : `-$${Math.abs(Number(p.unrealized_pnl)).toLocaleString()}`;
                message += `${side} ${p.symbol}\n`;
                message += `💰 $${Number(p.position_value_usd).toLocaleString()}\n`;
                message += `📈 Kaldıraç: ${p.leverage}x\n`;
                message += `💹 PNL: ${pnl}\n\n`;
              }
            }

            if (!message) message = '✅ Bot çalışıyor, balina yok!';

            await httpsPost(
              `https://api.telegram.org/bot${process.env.TELEGRAM_TOKEN}/sendMessage`,
              { chat_id: process.env.TELEGRAM_CHAT_ID, text: message }
            );

            console.log('Gönderildi!');
