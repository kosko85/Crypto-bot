name: Balina UyarДұsДұ

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  balina-kontrol:
    runs-on: ubuntu-latest
    steps:
      - name: Balina KontrolГј
        run: |
          node << 'EOF'
          const https = require('https');

          async function fetchData(url, apiKey) {
            return new Promise((resolve, reject) => {
              const options = {
                headers: {
                  'accept': 'application/json',
                  'CG-API-KEY': apiKey
                }
              };
              https.get(url, options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(JSON.parse(data)));
              }).on('error', reject);
            });
          }

          async function sendTelegram(token, chatId, message) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify({
                chat_id: chatId,
                text: message,
                parse_mode: 'Markdown'
              });
              const options = {
                hostname: 'api.telegram.org',
                path: `/bot${token}/sendMessage`,
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body)
                }
              };
              const req = https.request(options, resolve);
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          (async () => {
            const API_KEY = process.env.COINGLASS_API_KEY;
            const TOKEN = process.env.TELEGRAM_TOKEN;
            const CHAT_ID = process.env.TELEGRAM_CHAT_ID;

            // 1. Balina AlarmДұ
            const alertData = await fetchData(
              'https://open-api-v4.coinglass.com/api/hyperliquid/whale-alert',
              API_KEY
            );

            // 2. Whale PozisyonlarДұ
            const posData = await fetchData(
              'https://open-api-v4.coinglass.com/api/hyperliquid/whale-position',
              API_KEY
            );

            const whales = alertData.data || [];
            const positions = posData.data || [];

            // En bГјyГјk balinayДұ bul
            const biggestWhale = positions.sort((a, b) => 
              Number(b.position_value_usd) - Number(a.position_value_usd)
            )[0];

            // 3. En bГјyГјk balinanДұn cГјzdanДұnДұ takip et
            let walletMessage = '';
            if (biggestWhale?.user) {
              const walletData = await fetchData(
                `https://open-api-v4.coinglass.com/api/hyperliquid/wallet-positions-by-address?address=${biggestWhale.user}`,
                API_KEY
              );
              const wallet = walletData.data;
              if (wallet) {
                walletMessage += `\nрҹ”Қ *En BГјyГјk Balina CГјzdanДұ:*\n`;
                walletMessage += `рҹ‘Ө \`${biggestWhale.user?.slice(0,10)}...\`\n`;
                walletMessage += `рҹ’ј Hesap DeДҹeri: $${Number(wallet.margin_summary?.account_value).toLocaleString()}\n`;
                walletMessage += `рҹ“Ҡ Toplam Pozisyon: $${Number(wallet.margin_summary?.total_ntl_pos).toLocaleString()}\n`;
                if (wallet.asset_positions?.length > 0) {
                  for (const ap of wallet.asset_positions.slice(0, 3)) {
                    const p = ap.position;
                    const side = Number(p.szi) > 0 ? 'рҹҹў LONG' : 'рҹ”ҙ SHORT';
                    walletMessage += `\n${side} *${p.coin}*\n`;
                    walletMessage += `рҹ’° $${Number(p.position_value).toLocaleString()}\n`;
                    walletMessage += `рҹ’№ PNL: $${Number(p.unrealized_pnl).toLocaleString()}\n`;
                  }
                }
              }
            }

            const fiveMinsAgo = Date.now() - 5 * 60 * 1000;
            const recent = whales.filter(w => Number(w.create_time) > fiveMinsAgo);

            let message = '';

            // Balina AlarmlarДұ
            if (recent.length > 0) {
              message += 'рҹҗӢ *Hyperliquid Balina AlarmДұ!*\n\n';
              for (const w of recent.slice(0, 5)) {
                const action = w.position_action === 1 ? 'рҹҹў POZД°SYON AГҮTI' : 'рҹ”ҙ POZД°SYON KAPATTI';
                message += `${action} *${w.symbol}*\n`;
                message += `рҹ’° $${Number(w.position_value_usd).toLocaleString()}\n`;
                message += `рҹ’ө GiriЕҹ: $${w.entry_price}\n`;
                message += `вҸ° ${new Date(Number(w.create_time)).toLocaleTimeString('tr-TR')}\n\n`;
              }
            }

            // En BГјyГјk Pozisyonlar
            if (positions.length > 0) {
              message += 'рҹ“Ҡ *En BГјyГјk Pozisyonlar:*\n\n';
              for (const p of positions.slice(0, 3)) {
                const side = Number(p.position_size) > 0 ? 'рҹҹў LONG' : 'рҹ”ҙ SHORT';
                const pnl = Number(p.unrealized_pnl) > 0
                  ? `+$${Number(p.unrealized_pnl).toLocaleString()}`
                  : `-$${Math.abs(Number(p.unrealized_pnl)).toLocaleString()}`;
                message += `${side} *${p.symbol}*\n`;
                message += `рҹ’° $${Number(p.position_value_usd).toLocaleString()}\n`;
                message += `рҹ“Ҳ KaldДұraГ§: ${p.leverage}x\n`;
                message += `рҹ’ө GiriЕҹ: $${p.entry_price}\n`;
                message += `рҹ’№ PNL: ${pnl}\n\n`;
              }
            }

            // En BГјyГјk Balina CГјzdanДұ
            message += walletMessage;

            if (!message) message = 'вң… Bot Г§alДұЕҹДұyor, balina yok!';

            await sendTelegram(TOKEN, CHAT_ID, message);
            console.log('GГ¶nderildi!');
          })();
          EOF
        env:
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
